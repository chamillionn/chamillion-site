<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stablecoins Market Cap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toggle-bar">
    <button id="theme-toggle" aria-label="Cambiar tema"></button>
  </div>
  <div id="ctx-menu" class="ctx-menu" hidden>
    <button id="ctx-capture">Modo captura</button>
  </div>

  <div class="container">
    <h1>Stablecoins</h1>
    <p class="subtitle">Capitalización de mercado total · Nov 2017 — Feb 2026</p>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-label">Actual</span>
        <span class="stat-value" id="stat-current"></span>
      </div>
      <div class="stat">
        <span class="stat-label">Máximo</span>
        <span class="stat-value" id="stat-max"></span>
      </div>
      <div class="stat">
        <span class="stat-label">Crecimiento</span>
        <span class="stat-value" id="stat-growth"></span>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <canvas id="chart-overlay"></canvas>
      <div class="chart-tooltip" id="chart-tooltip" hidden>
        <div class="tip-date" id="tip-date"></div>
        <div class="tip-value" id="tip-value"></div>
      </div>
    </div>

    <p class="source">Fuente: DefiLlama — Stablecoins Dashboard</p>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
