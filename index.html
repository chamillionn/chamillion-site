<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Mercado de Patatas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
      color: #e6edf3;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #7d8590;
      margin-bottom: 20px;
    }

    /* --- Orderbook table --- */
    .book-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px 4px;
      color: #7d8590;
    }

    .book-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 4px 12px;
      font-size: 11px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .book-header .right { text-align: right; }

    .book-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 3px 12px;
      font-size: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.1s;
    }
    .book-row:hover { background: #161b22; }
    .book-row .right { text-align: right; }

    .book-row .depth-bar {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      opacity: 0.12;
      pointer-events: none;
      transition: width 0.3s ease;
    }

    .asks-section .book-row { color: #f85149; }
    .asks-section .depth-bar { background: #f85149; }
    .bids-section .book-row { color: #3fb950; }
    .bids-section .depth-bar { background: #3fb950; }

    .book-row .col-total { color: #484f58; }

    /* --- Order form --- */
    .order-form {
      margin-top: 20px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 16px;
    }

    .form-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e6edf3;
    }

    .side-toggle {
      display: flex;
      margin-bottom: 12px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #21262d;
    }
    .side-toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #0d1117;
      color: #7d8590;
      transition: all 0.15s;
    }
    .side-toggle button.active-buy {
      background: #123d2a;
      color: #3fb950;
    }
    .side-toggle button.active-sell {
      background: #3d1a1a;
      color: #f85149;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 11px;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #388bfd; }

    .submit-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn.buy  { background: #238636; color: #fff; }
    .submit-btn.sell { background: #da3633; color: #fff; }

    /* --- Toast notification --- */
    .toast-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    .toast-overlay.visible { display: flex; }

    .toast-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 380px;
      text-align: center;
      animation: popIn 0.3s ease;
    }

    .toast-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .toast-title {
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .toast-body {
      font-size: 13px;
      color: #9198a1;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .toast-body strong { color: #e6edf3; }

    .toast-dismiss {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 24px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toast-dismiss:hover { background: #30363d; }

    .toast-resting {
      font-size: 12px;
      color: #484f58;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>El Mercado de Patatas</h1>
    <p class="subtitle">La gente quiere comprar y vender patatas. Haz clic en un precio para rellenar el formulario.</p>

    <!-- Asks (sellers) — best ask at the bottom, closest to bids -->
    <div class="asks-section">
      <div class="book-section-label">Vendedores (tienen patatas, quieren EUR)</div>
      <div class="book-header">
        <div>Precio (EUR)</div>
        <div class="right">Kg</div>
        <div class="right">Total Kg</div>
      </div>
      <div id="asks-body"></div>
    </div>

    <!-- Bids (buyers) — best bid at top -->
    <div class="bids-section">
      <div class="book-section-label">Compradores (tienen EUR, quieren patatas)</div>
      <div class="book-header">
        <div>Precio (EUR)</div>
        <div class="right">Kg</div>
        <div class="right">Total Kg</div>
      </div>
      <div id="bids-body"></div>
    </div>

    <!-- Order form -->
    <div class="order-form">
      <div class="form-title">Coloca tu orden</div>
      <div class="side-toggle">
        <button id="btn-buy" class="active-buy" onclick="setSide('buy')">Comprar Patatas</button>
        <button id="btn-sell" onclick="setSide('sell')">Vender Patatas</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Precio (EUR por Kg)</label>
          <input id="input-price" type="number" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Cantidad (Kg)</label>
          <input id="input-qty" type="number" step="0.1" min="0.1" value="1">
        </div>
      </div>
      <button class="submit-btn buy" id="submit-btn" onclick="placeOrder()">Comprar Patatas</button>
    </div>
  </div>

  <!-- Trade notification overlay -->
  <div class="toast-overlay" id="toast-overlay">
    <div class="toast-box">
      <div class="toast-icon" id="toast-icon"></div>
      <div class="toast-title" id="toast-title"></div>
      <div class="toast-body" id="toast-body"></div>
      <div class="toast-resting" id="toast-resting"></div>
      <button class="toast-dismiss" onclick="dismissToast()">Entendido</button>
    </div>
  </div>

<script>
// ── State ────────────────────────────────────────────────────────────
let bids = [];
let asks = [];
let side = 'buy';

// ── Seed data ────────────────────────────────────────────────────────
function seed() {
  const mid = 2; // EUR per Kg — a realistic-ish potato price
  for (let i = 1; i <= 4; i++) {
    bids.push({ price: +(mid - i * 0.05).toFixed(2), qty: +(Math.random() * 5 + 1).toFixed(1) });
    asks.push({ price: +(mid + i * 0.05).toFixed(2), qty: +(Math.random() * 5 + 1).toFixed(1) });
  }
  sortBook();
}

function sortBook() {
  bids.sort((a, b) => b.price - a.price);
  asks.sort((a, b) => a.price - b.price);
}

// ── Matching engine ──────────────────────────────────────────────────
function addOrder(orderSide, price, qty) {
  let remaining = qty;
  let totalFilled = 0;
  let totalCost = 0;

  if (orderSide === 'buy') {
    while (remaining > 0 && asks.length > 0 && asks[0].price <= price) {
      const ask = asks[0];
      const filled = Math.min(remaining, ask.qty);
      remaining = +(remaining - filled).toFixed(4);
      ask.qty = +(ask.qty - filled).toFixed(4);
      totalFilled += filled;
      totalCost += filled * ask.price;
      if (ask.qty <= 0) asks.shift();
    }
    if (remaining > 0) {
      bids.push({ price, qty: +remaining.toFixed(4) });
    }
  } else {
    while (remaining > 0 && bids.length > 0 && bids[0].price >= price) {
      const bid = bids[0];
      const filled = Math.min(remaining, bid.qty);
      remaining = +(remaining - filled).toFixed(4);
      bid.qty = +(bid.qty - filled).toFixed(4);
      totalFilled += filled;
      totalCost += filled * bid.price;
      if (bid.qty <= 0) bids.shift();
    }
    if (remaining > 0) {
      asks.push({ price, qty: +remaining.toFixed(4) });
    }
  }

  sortBook();
  render();

  // Show notification
  if (totalFilled > 0 && remaining > 0) {
    showToast(orderSide, totalFilled, totalCost, +remaining.toFixed(1));
  } else if (totalFilled > 0) {
    showToast(orderSide, totalFilled, totalCost, 0);
  } else {
    showRestingToast(orderSide, qty, price);
  }
}

// ── Toast notifications ──────────────────────────────────────────────
function showToast(orderSide, filledQty, cost, restingQty) {
  const icon = orderSide === 'buy' ? '🥔' : '💶';
  const title = orderSide === 'buy'
    ? 'Has recibido patatas!'
    : 'Has recibido euros!';

  let body;
  if (orderSide === 'buy') {
    body = `Tu orden ha encajado con la de un vendedor.<br>
      Has recibido <strong>${filledQty.toFixed(1)} Kg de patatas</strong>
      y has pagado <strong>${cost.toFixed(2)} EUR</strong>.`;
  } else {
    body = `Tu orden ha encajado con la de un comprador.<br>
      Has vendido <strong>${filledQty.toFixed(1)} Kg de patatas</strong>
      y has recibido <strong>${cost.toFixed(2)} EUR</strong>.`;
  }

  let resting = '';
  if (restingQty > 0) {
    resting = orderSide === 'buy'
      ? `${restingQty} Kg siguen esperando en el libro a que aparezca un vendedor a tu precio.`
      : `${restingQty} Kg siguen esperando en el libro a que aparezca un comprador a tu precio.`;
  }

  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').innerHTML = body;
  document.getElementById('toast-resting').textContent = resting;
  document.getElementById('toast-overlay').classList.add('visible');
}

function showRestingToast(orderSide, qty, price) {
  const icon = '⏳';
  const title = 'Orden colocada — esperando match';

  let body;
  if (orderSide === 'buy') {
    body = `Nadie vende a <strong>${price.toFixed(2)} EUR</strong> o menos ahora mismo.<br>
      Tu orden de <strong>${qty.toFixed(1)} Kg</strong> queda en el libro,
      esperando a que aparezca un vendedor.`;
  } else {
    body = `Nadie compra a <strong>${price.toFixed(2)} EUR</strong> o mas ahora mismo.<br>
      Tu oferta de <strong>${qty.toFixed(1)} Kg</strong> queda en el libro,
      esperando a que aparezca un comprador.`;
  }

  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').innerHTML = body;
  document.getElementById('toast-resting').textContent = '';
  document.getElementById('toast-overlay').classList.add('visible');
}

function dismissToast() {
  document.getElementById('toast-overlay').classList.remove('visible');
}

// ── Rendering ────────────────────────────────────────────────────────
function render() {
  renderSide('asks-body', asks, 'ask');
  renderSide('bids-body', bids, 'bid');
}

function renderSide(containerId, orders, type) {
  const el = document.getElementById(containerId);
  if (orders.length === 0) {
    el.innerHTML = '<div style="padding:6px 12px;font-size:12px;color:#484f58;">Sin ordenes</div>';
    return;
  }

  let cumulative = 0;
  const rows = orders.map(o => {
    cumulative += o.qty;
    return { ...o, total: +cumulative.toFixed(4) };
  });
  const maxTotal = rows[rows.length - 1].total;

  const display = type === 'ask' ? [...rows].reverse() : rows;

  el.innerHTML = display.map(r => {
    const depthPct = ((r.total / maxTotal) * 100).toFixed(1);
    return `<div class="book-row" onclick="fillPrice(${r.price})">
      <div class="depth-bar" style="width:${depthPct}%"></div>
      <div>${r.price.toFixed(2)}</div>
      <div class="right">${Number(r.qty).toFixed(1)}</div>
      <div class="right col-total">${Number(r.total).toFixed(1)}</div>
    </div>`;
  }).join('');
}

// ── UI helpers ───────────────────────────────────────────────────────
function setSide(s) {
  side = s;
  document.getElementById('btn-buy').className = s === 'buy' ? 'active-buy' : '';
  document.getElementById('btn-sell').className = s === 'sell' ? 'active-sell' : '';

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.className = 'submit-btn ' + s;
  submitBtn.textContent = s === 'buy' ? 'Comprar Patatas' : 'Vender Patatas';
}

function fillPrice(price) {
  document.getElementById('input-price').value = price.toFixed(2);
  document.getElementById('input-price').focus();
}

function placeOrder() {
  const price = parseFloat(document.getElementById('input-price').value);
  const qty = parseFloat(document.getElementById('input-qty').value);
  if (isNaN(price) || price <= 0 || isNaN(qty) || qty <= 0) return;
  addOrder(side, +price.toFixed(2), +qty.toFixed(1));
  document.getElementById('input-qty').value = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.id === 'input-price' || document.activeElement.id === 'input-qty')) {
    placeOrder();
  }
});

// ── Init ─────────────────────────────────────────────────────────────
seed();
render();
</script>
</body>
</html>
