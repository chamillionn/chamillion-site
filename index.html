<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamillion</title>
  <meta name="description" content="Newsletter sobre DeFi y mercados crypto. 500 € invertidos en DeFi, documentados on-chain.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: #0f0f0f;
      color: #e8e6e1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .landing {
      max-width: 520px;
      text-align: center;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #e8e6e1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.78rem;
      color: #6b8cae;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .desc {
      font-size: 0.72rem;
      color: #666;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .desc strong {
      color: #999;
      font-weight: 400;
    }

    .cta {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #0f0f0f;
      background: #6b8cae;
      padding: 10px 28px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }
    .cta:hover { background: #7d9dbe; }

    .status {
      font-size: 0.6rem;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .face-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Chameleon background (loaded from SVG file) -->
  <div id="face-bg" class="face-bg"></div>

  <div class="landing">
    <h1 class="logo">chamillion</h1>
    <p class="tagline">DeFi, mercados crypto y transparencia on-chain.</p>
    <p class="desc">
      <strong>500 € iniciales + 100 €/mes</strong> invertidos en mercados DeFi.<br>
      Todo documentado. Todo verificable. Sin pedir permiso.
    </p>
    <a class="cta" href="https://chamillion.substack.com" target="_blank">Suscríbete en Substack</a>
    <p class="status">en construcción</p>
  </div>
  <script>
    fetch('assets/face-vectorizable.svg')
      .then(function(r) { return r.text(); })
      .then(function(svgText) {
        var container = document.getElementById('face-bg');
        container.innerHTML = svgText;
        var svg = container.querySelector('svg');

        // Make SVG responsive
        svg.setAttribute('viewBox', '0 0 2048 2048');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.style.width = '100%';
        svg.style.height = '100%';

        // Add interactive pupil + highlight
        var ns = 'http://www.w3.org/2000/svg';
        var pupil = document.createElementNS(ns, 'circle');
        pupil.setAttribute('cx', '1092');
        pupil.setAttribute('cy', '798');
        pupil.setAttribute('r', '60');
        pupil.setAttribute('fill', '#1a4a7a');
        svg.appendChild(pupil);

        var highlight = document.createElementNS(ns, 'circle');
        highlight.setAttribute('cx', '1052');
        highlight.setAttribute('cy', '758');
        highlight.setAttribute('r', '20');
        highlight.setAttribute('fill', '#b8d0e4');
        svg.appendChild(highlight);

        // Eye tracking
        var eyeCx = 1092, eyeCy = 798;
        var maxR = 60;

        document.addEventListener('mousemove', function(e) {
          var rect = svg.getBoundingClientRect();
          // With preserveAspectRatio="xMidYMid slice", the SVG covers the container
          // Scale is determined by the larger ratio (cover behavior)
          var scaleX = 2048 / rect.width;
          var scaleY = 2048 / rect.height;
          var scale = Math.min(scaleX, scaleY);
          var offsetX = (2048 - rect.width * scale) / 2;
          var offsetY = (2048 - rect.height * scale) / 2;
          var mx = (e.clientX - rect.left) * scale + offsetX;
          var my = (e.clientY - rect.top) * scale + offsetY;
          var dx = mx - eyeCx;
          var dy = my - eyeCy;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var c = Math.min(dist, maxR) / (dist || 1);
          var px = eyeCx + dx * c;
          var py = eyeCy + dy * c;
          pupil.setAttribute('cx', px);
          pupil.setAttribute('cy', py);
          highlight.setAttribute('cx', px - 40);
          highlight.setAttribute('cy', py - 40);
        });
      });
  </script>
</body>
</html>
