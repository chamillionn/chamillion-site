<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="head">
      <path d="M134 0
               C122 10, 110 22, 91 45
               C78 47, 68 50, 61 61
               C58 72, 48 95, 30 117
               C29 122, 31 127, 29 131
               C27 136, 27 139, 27 141
               C30 152, 40 166, 51 179
               C60 190, 70 198, 75 200
               L200 200 L200 0 Z"/>
    </clipPath>
  </defs>

  <!-- 1. Head body (lighter blue) -->
  <path d="M134 0
           C122 10, 110 22, 91 45
           C78 47, 68 50, 61 61
           C58 72, 48 95, 30 117
           C29 122, 31 127, 29 131
           C27 136, 27 139, 27 141
           C30 152, 40 166, 51 179
           C60 190, 70 198, 75 200
           L200 200 L200 0 Z"
        fill="#6094bc"/>

  <!-- 2. Casque overlay (darker blue, clipped to head) -->
  <path d="M0 0 L200 0 L200 8
           C135 22, 117 29, 100 39
           C88 49, 75 62, 59 80
           L0 90 Z"
        fill="#2670ad" clip-path="url(#head)"/>

  <!-- 3. Right-side crescent curve (darker blue) -->
  <path d="M122 57
           C135 60, 144 75, 144 88
           C144 101, 135 114, 122 118
           L117 112
           C128 108, 135 98, 135 88
           C135 78, 128 68, 117 63 Z"
        fill="#2670ad"/>

  <!-- 4. Nostril -->
  <ellipse cx="70" cy="96" rx="4" ry="6" fill="#2670ad"/>

  <!-- 5. Eye — concentric circles -->
  <circle cx="90" cy="64" r="18" fill="#2670ad"/>
  <circle cx="90" cy="64" r="12.5" fill="#6094bc"/>
  <circle cx="90" cy="64" r="5.5" fill="#2670ad"/>

  <!-- 6. Pupil + highlight -->
  <circle cx="90" cy="64" r="4" fill="#1a4a7a"/>
  <circle cx="87" cy="61" r="1.5" fill="#b8d0e4"/>

  <!-- 7. Mouth (white line) -->
  <line x1="31" y1="129" x2="98" y2="142" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- 8. Jaw teeth -->
  <g stroke="#2670ad" stroke-width="2" stroke-linecap="round">
    <line x1="29" y1="145" x2="30" y2="161"/>
    <line x1="32" y1="160" x2="33" y2="169"/>
    <line x1="40" y1="166" x2="41" y2="178"/>
    <line x1="45" y1="176" x2="47" y2="186"/>
    <line x1="54" y1="179" x2="56" y2="195"/>
  </g>
</svg>
