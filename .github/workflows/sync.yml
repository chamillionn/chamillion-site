name: Portfolio Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # permite ejecutar manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET https://chamillion.site/api/sync \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}")
          http_status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_status"
          echo "$body" | jq . 2>/dev/null || echo "$body"
          [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ] || exit 1
