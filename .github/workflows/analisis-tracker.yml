name: Analisis tracker tick

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours, aligned with observations
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call tracker endpoint
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET https://chamillion.site/api/cron/analisis-tracker \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}")
          http_status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_status"
          echo "$body" | jq . 2>/dev/null || echo "$body"
          [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ] || exit 1
