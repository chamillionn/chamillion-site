<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Mercado de Patatas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
      background: #171717;
      color: #c8c6c1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px 10px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .main-layout {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .orderbook-container {
      flex: 1;
      min-width: 280px;
    }

    .form-container {
      width: 200px;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-align: center;
      margin-bottom: 2px;
      color: #e8e6e1;
    }

    .subtitle {
      text-align: center;
      font-size: 0.65rem;
      color: #8a8a8e;
      margin-bottom: 10px;
    }

    /* --- Orderbook table --- */
    .book-section-label {
      font-size: 14px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0.02em;
      padding: 8px 10px 5px;
      color: #c8c6c1;
    }

    .book-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 5px 10px;
      font-size: 12px;
      color: #8a8a8e;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .book-header .right { text-align: right; }

    .book-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 7px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
    }
    .book-row:hover { background: #2a2a2e; }
    .book-row .right { text-align: right; }

    .book-row .depth-bar {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      opacity: 0.25;
      pointer-events: none;
      transition: width 0.3s ease;
    }

    .asks-section .book-row { color: #fb923c; }
    .asks-section .depth-bar { background: #fb923c; }
    .bids-section .book-row { color: #4ade80; }
    .bids-section .depth-bar { background: #4ade80; }

    .book-row .col-total { color: #555555; }

    /* --- User order highlight --- */
    .book-row.user-order {
      border: 2px solid;
      border-radius: 8px;
      animation: userOrderPulse 2s ease-in-out infinite;
      padding-left: 14px;
    }

    .asks-section .book-row.user-order {
      border-color: #fb923c;
      box-shadow: 0 0 12px rgba(251, 146, 60, 0.4);
    }

    .bids-section .book-row.user-order {
      border-color: #4ade80;
      box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
    }

    @keyframes userOrderPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .user-order-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
      margin-right: 6px;
    }

    /* --- Order form --- */
    .order-form {
      background: #1e1e22;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 12px;
      position: sticky;
      top: 20px;
    }

    .form-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e8e6e1;
    }

    .side-toggle {
      display: flex;
      margin-bottom: 8px;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid #2a2a2e;
    }
    .side-toggle button {
      flex: 1;
      padding: 6px;
      border: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: #171717;
      color: #8a8a8e;
      transition: all 0.15s;
    }
    .side-toggle button.active-buy {
      background: #1a3d2a;
      color: #4ade80;
    }
    .side-toggle button.active-sell {
      background: #3d2315;
      color: #fb923c;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .form-group label {
      font-size: 10px;
      color: #8a8a8e;
      text-transform: none;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .form-group input {
      width: 100%;
      background: #171717;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 7px 8px;
      color: #e8e6e1;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: #6b9ebb; }

    .submit-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn.buy  { background: #22c55e; color: #fff; }
    .submit-btn.sell { background: #f97316; color: #fff; }

    /* --- Toast notification --- */
    .toast-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    .toast-overlay.visible { display: flex; }

    .toast-box {
      background: #1e1e22;
      border: 1px solid #2a2a2e;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 380px;
      text-align: center;
      animation: popIn 0.3s ease;
    }

    .toast-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .toast-title {
      font-size: 16px;
      font-weight: 700;
      color: #e8e6e1;
      margin-bottom: 8px;
    }

    .toast-body {
      font-size: 13px;
      color: #8a8a8e;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .toast-body strong { color: #e8e6e1; }

    .toast-dismiss {
      background: #2a2a2e;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 8px 24px;
      color: #c8c6c1;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toast-dismiss:hover { background: #3a3a3e; }

    .toast-resting {
      font-size: 12px;
      color: #555555;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Tooltip ── */
    .tooltip-box {
      position: fixed; z-index: 9999;
      background: #1e1e22; border: 1px solid #2a2a2e; border-radius: 8px;
      padding: 10px 14px; max-width: 240px;
      font-family: system-ui, sans-serif; font-size: 0.72rem;
      color: #c8c6c1; line-height: 1.5;
      pointer-events: none; opacity: 0; transition: opacity 0.12s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .tooltip-box.visible { opacity: 1; }
    .tooltip-box .th { color: #e8e6e1; font-weight: 600; }

    /* ── Spread indicator ── */
    .spread-indicator {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 5px 10px;
      font-family: 'DM Mono', monospace; font-size: 12px; color: #8a8a8e;
      border-top: 1px solid #2a2a2e; border-bottom: 1px solid #2a2a2e;
      cursor: default;
    }
    .spread-indicator .spread-value { color: #e8e6e1; font-weight: 500; }
    .spread-indicator .spread-pct { font-size: 11px; color: #555555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Libro de Órdenes - Mercado de Patatas</h1>
    <p class="subtitle">La gente quiere comprar y vender patatas. Haz clic en un precio para rellenar el formulario.</p>

    <div class="main-layout">
      <!-- Orderbook -->
      <div class="orderbook-container">
        <!-- Asks (sellers) — best ask at the bottom, closest to bids -->
        <div class="asks-section">
          <div class="book-section-label" data-tooltip="Estas personas han puesto una <strong class='th'>orden de venta</strong>: están dispuestas a vender patatas si alguien llega y paga su precio.">⬇️ Venden patatas</div>
          <div class="book-header">
            <div data-tooltip="El <strong class='th'>precio límite</strong>: el mínimo al que este vendedor acepta vender. No venderá por menos.">💰 Precio</div>
            <div class="right" data-tooltip="Los <strong class='th'>kilos disponibles</strong> a ese precio exacto. Si compras más, tendrás que pagar el siguiente precio.">🥔 Kilos</div>
            <div class="right" data-tooltip="El <strong class='th'>total acumulado</strong>: suma de estos kilos más todos los de precios inferiores. Cuánto hay disponible hasta aquí.">📦 Total</div>
          </div>
          <div id="asks-body"></div>
        </div>

        <!-- Spread indicator -->
        <div class="spread-indicator" id="spread-indicator"
          data-tooltip="El <strong class='th'>spread</strong> es la diferencia entre el precio más bajo al que alguien vende y el más alto al que alguien compra. Cuanto menor, más eficiente es el mercado.">
          <span>↕ Spread</span>
          <span class="spread-value" id="spread-value">—</span>
          <span class="spread-pct" id="spread-pct"></span>
        </div>

        <!-- Bids (buyers) — best bid at top -->
        <div class="bids-section">
          <div class="book-section-label" data-tooltip="Estas personas han puesto una <strong class='th'>orden de compra</strong>: esperan que alguien venda patatas al precio que ofrecen.">⬆️ Compran patatas</div>
          <div class="book-header">
            <div data-tooltip="El <strong class='th'>precio límite</strong>: el máximo que este comprador pagará. No pagará más.">💰 Precio</div>
            <div class="right" data-tooltip="Los <strong class='th'>kilos que quiere comprar</strong> a ese precio.">🥔 Kilos</div>
            <div class="right" data-tooltip="El <strong class='th'>total acumulado</strong> desde el mejor precio de compra hasta aquí. Refleja la demanda total disponible.">📦 Total</div>
          </div>
          <div id="bids-body"></div>
        </div>
      </div>

      <!-- Order form -->
      <div class="form-container">
        <div class="order-form">
          <div class="form-title" data-tooltip="Aquí colocas tu propia <strong class='th'>orden límite</strong>: fijas precio y cantidad. Si hay contrapartida, se ejecuta al instante; si no, queda esperando en el libro.">¿Qué quieres hacer?</div>
          <div class="side-toggle">
            <button id="btn-buy" class="active-buy" onclick="setSide('buy')" data-tooltip="Colocarás una <strong class='th'>orden de compra</strong>. Si tu precio iguala o supera el precio de venta más bajo, la operación se ejecuta de inmediato.">⬆️ Comprar</button>
            <button id="btn-sell" onclick="setSide('sell')" data-tooltip="Colocarás una <strong class='th'>orden de venta</strong>. Si tu precio iguala o baja al precio de compra más alto, encontrarás comprador al instante.">⬇️ Vender</button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-tooltip="El precio al que quieres operar. Si cruza el libro, la orden se ejecuta sola. Si no, queda en el libro como <strong class='th'>orden límite</strong>.">💰 Precio/kg</label>
              <input id="input-price" type="number" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label data-tooltip="Los <strong class='th'>kilos</strong> que quieres comprar o vender. Una orden puede ejecutarse contra varias filas del libro si hay cantidad suficiente.">🥔 Kilos</label>
              <input id="input-qty" type="number" step="0.1" min="0.1" value="1">
            </div>
          </div>
          <button class="submit-btn buy" id="submit-btn" onclick="placeOrder()" data-tooltip="Al pulsar, tu orden de <strong class='th'>compra</strong> entra al mercado. Si hay alguien vendiendo a tu precio o menos, se ejecuta al instante.">⬆️ Comprar Patatas</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tooltip educativo -->
  <div class="tooltip-box" id="tooltip-box" role="tooltip" aria-live="polite"></div>

  <!-- Trade notification overlay -->
  <div class="toast-overlay" id="toast-overlay">
    <div class="toast-box">
      <div class="toast-icon" id="toast-icon"></div>
      <div class="toast-title" id="toast-title"></div>
      <div class="toast-body" id="toast-body"></div>
      <div class="toast-resting" id="toast-resting"></div>
      <button class="toast-dismiss" onclick="dismissToast()">Entendido</button>
    </div>
  </div>

<script>
// ── State ────────────────────────────────────────────────────────────
let bids = [];
let asks = [];
let side = 'buy';

// ── Seed data ────────────────────────────────────────────────────────
function seed() {
  const mid = 2; // EUR per Kg — a realistic-ish potato price
  for (let i = 1; i <= 4; i++) {
    bids.push({ price: +(mid - i * 0.05).toFixed(2), qty: +(Math.random() * 5 + 1).toFixed(1), isUser: false });
    asks.push({ price: +(mid + i * 0.05).toFixed(2), qty: +(Math.random() * 5 + 1).toFixed(1), isUser: false });
  }
  sortBook();
}

function sortBook() {
  bids.sort((a, b) => b.price - a.price);
  asks.sort((a, b) => a.price - b.price);
}

// ── Matching engine ──────────────────────────────────────────────────
function addOrder(orderSide, price, qty, isUser = false) {
  let remaining = qty;
  let totalFilled = 0;
  let totalCost = 0;

  if (orderSide === 'buy') {
    while (remaining > 0 && asks.length > 0 && asks[0].price <= price) {
      const ask = asks[0];
      const filled = Math.min(remaining, ask.qty);
      remaining = +(remaining - filled).toFixed(4);
      ask.qty = +(ask.qty - filled).toFixed(4);
      totalFilled += filled;
      totalCost += filled * ask.price;
      if (ask.qty <= 0) asks.shift();
    }
    if (remaining > 0) {
      bids.push({ price, qty: +remaining.toFixed(4), isUser });
    }
  } else {
    while (remaining > 0 && bids.length > 0 && bids[0].price >= price) {
      const bid = bids[0];
      const filled = Math.min(remaining, bid.qty);
      remaining = +(remaining - filled).toFixed(4);
      bid.qty = +(bid.qty - filled).toFixed(4);
      totalFilled += filled;
      totalCost += filled * bid.price;
      if (bid.qty <= 0) bids.shift();
    }
    if (remaining > 0) {
      asks.push({ price, qty: +remaining.toFixed(4), isUser });
    }
  }

  // Limpiar órdenes vacías (por si acaso)
  bids = bids.filter(o => o.qty > 0);
  asks = asks.filter(o => o.qty > 0);

  sortBook();
  render();

  // Show notification
  if (totalFilled > 0 && remaining > 0) {
    showToast(orderSide, totalFilled, totalCost, +remaining.toFixed(1));
  } else if (totalFilled > 0) {
    showToast(orderSide, totalFilled, totalCost, 0);
  } else {
    showRestingToast(orderSide, qty, price);
  }

  // Return info about what happened
  return { totalFilled, remaining: +remaining.toFixed(4), totalCost };
}

// ── Auto-fill system ─────────────────────────────────────────────────
function scheduleAutoFill(orderSide, price, qty) {
  const delay = 10000 + Math.random() * 5000; // 10-15 segundos aleatorio

  setTimeout(() => {
    // Cerrar el toast de espera si está abierto
    dismissToast();

    // Pequeño delay antes de ejecutar para que el usuario vea que se cerró la notificación
    setTimeout(() => {
      // Generar orden contraria que haga match
      const oppositeSide = orderSide === 'buy' ? 'sell' : 'buy';
      // Para asegurar el match: si compra a X, vendemos a X; si vende a X, compramos a X
      const matchPrice = price;
      // Cantidad suficiente para rellenar completamente
      const matchQty = qty * 1.2; // 20% más para asegurar relleno completo

      addOrder(oppositeSide, matchPrice, matchQty, false);
    }, 300);
  }, delay);
}

// ── Toast notifications ──────────────────────────────────────────────
function showToast(orderSide, filledQty, cost, restingQty) {
  const icon = orderSide === 'buy' ? '🎉🥔' : '🎉💰';
  const title = orderSide === 'buy'
    ? '¡Trato hecho!'
    : '¡Vendido!';

  let body;
  if (orderSide === 'buy') {
    body = `Has comprado <strong>${filledQty.toFixed(1)} kilos de patatas</strong>
      por <strong>${cost.toFixed(2)} EUR</strong>.`;
  } else {
    body = `Has vendido <strong>${filledQty.toFixed(1)} kilos de patatas</strong>
      y recibiste <strong>${cost.toFixed(2)} EUR</strong>.`;
  }

  let resting = '';
  if (restingQty > 0) {
    resting = orderSide === 'buy'
      ? `⏳ ${restingQty} kilos más siguen esperando un vendedor.`
      : `⏳ ${restingQty} kilos más siguen esperando un comprador.`;
  }

  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').innerHTML = body;
  document.getElementById('toast-resting').textContent = resting;
  document.getElementById('toast-overlay').classList.add('visible');
}

function showRestingToast(orderSide, qty, price) {
  const icon = '⏳';
  let title, body;

  if (orderSide === 'buy') {
    title = 'Buscando vendedor...';
    body = `Tu orden de <strong>${qty.toFixed(1)} kilos a ${price.toFixed(2)} EUR</strong> está en el libro.<br><br>
      Esperando a que aparezca alguien que venda patatas a ese precio.`;
  } else {
    title = 'Buscando comprador...';
    body = `Tu oferta de <strong>${qty.toFixed(1)} kilos a ${price.toFixed(2)} EUR</strong> está en el libro.<br><br>
      Esperando a que aparezca alguien que compre patatas a ese precio.`;
  }

  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').innerHTML = body;
  document.getElementById('toast-resting').textContent = '';
  document.getElementById('toast-overlay').classList.add('visible');
}

function dismissToast() {
  document.getElementById('toast-overlay').classList.remove('visible');
}

// ── Rendering ────────────────────────────────────────────────────────
function render() {
  renderSide('asks-body', asks, 'ask');
  renderSide('bids-body', bids, 'bid');
  updateSpread();
}

function updateSpread() {
  const valEl = document.getElementById('spread-value');
  const pctEl = document.getElementById('spread-pct');
  if (!asks.length || !bids.length) { valEl.textContent = '—'; pctEl.textContent = ''; return; }
  const bestAsk = asks[0].price;
  const bestBid = bids[0].price;
  const spread = +(bestAsk - bestBid).toFixed(2);
  const pct = ((spread / ((bestAsk + bestBid) / 2)) * 100).toFixed(2);
  valEl.textContent = spread.toFixed(2) + ' €/kg';
  pctEl.textContent = '(' + pct + '%)';
}

function renderSide(containerId, orders, type) {
  const el = document.getElementById(containerId);
  if (orders.length === 0) {
    el.innerHTML = '<div style="padding:6px 12px;font-size:12px;color:#555555;">Sin ordenes</div>';
    return;
  }

  let cumulative = 0;
  const rows = orders.map(o => {
    cumulative += o.qty;
    return { ...o, total: +cumulative.toFixed(4) };
  });
  const maxTotal = rows[rows.length - 1].total;

  const display = type === 'ask' ? [...rows].reverse() : rows;

  el.innerHTML = display.map(r => {
    const depthPct = ((r.total / maxTotal) * 100).toFixed(1);
    const userClass = r.isUser ? ' user-order' : '';
    const userIcon = r.isUser ? '<span class="user-order-spinner">⏳</span>' : '';
    const tip = type === 'ask'
      ? `Alguien quiere vender <strong class='th'>${Number(r.qty).toFixed(1)} kg</strong> a <strong class='th'>${r.price.toFixed(2)} €/kg</strong>. Si compras a este precio o más, ejecutas esta orden. Total acumulado: <strong class='th'>${Number(r.total).toFixed(1)} kg</strong>.`
      : `Alguien quiere comprar <strong class='th'>${Number(r.qty).toFixed(1)} kg</strong> a <strong class='th'>${r.price.toFixed(2)} €/kg</strong>. Si vendes a este precio o menos, ejecutas esta orden. Total acumulado: <strong class='th'>${Number(r.total).toFixed(1)} kg</strong>.`;
    return `<div class="book-row${userClass}" onclick="fillPrice(${r.price})" data-tooltip="${tip}">
      <div class="depth-bar" style="width:${depthPct}%"></div>
      <div>${userIcon}${r.price.toFixed(2)}</div>
      <div class="right">${Number(r.qty).toFixed(1)}</div>
      <div class="right col-total">${Number(r.total).toFixed(1)}</div>
    </div>`;
  }).join('');
}

// ── UI helpers ───────────────────────────────────────────────────────
function setSide(s) {
  side = s;
  document.getElementById('btn-buy').className = s === 'buy' ? 'active-buy' : '';
  document.getElementById('btn-sell').className = s === 'sell' ? 'active-sell' : '';

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.className = 'submit-btn ' + s;
  submitBtn.textContent = s === 'buy' ? '⬆️ Comprar Patatas' : '⬇️ Vender Patatas';
  submitBtn.dataset.tooltip = s === 'buy'
    ? "Al pulsar, tu orden de <strong class='th'>compra</strong> entra al mercado. Si hay alguien vendiendo a tu precio o menos, se ejecuta al instante."
    : "Al pulsar, tu orden de <strong class='th'>venta</strong> entra al mercado. Si hay alguien comprando a tu precio o más, se ejecuta al instante.";
}

function fillPrice(price) {
  document.getElementById('input-price').value = price.toFixed(2);
  document.getElementById('input-price').focus();
}

function placeOrder() {
  const price = parseFloat(document.getElementById('input-price').value);
  const qty = parseFloat(document.getElementById('input-qty').value);
  if (isNaN(price) || price <= 0 || isNaN(qty) || qty <= 0) return;

  const result = addOrder(side, +price.toFixed(2), +qty.toFixed(1), true);

  // Si la orden quedó parcial o totalmente en el libro, programar auto-relleno
  if (result.remaining > 0) {
    scheduleAutoFill(side, +price.toFixed(2), result.remaining);
  }

  document.getElementById('input-qty').value = '1';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.id === 'input-price' || document.activeElement.id === 'input-qty')) {
    placeOrder();
  }
});

// ── Tooltip system ───────────────────────────────────────────────────
(function() {
  const box = document.getElementById('tooltip-box');
  let timer = null;

  function show(target) {
    box.innerHTML = target.getAttribute('data-tooltip');
    box.style.opacity = '0';
    box.style.display = 'block';
    const r = target.getBoundingClientRect();
    const bW = box.offsetWidth, bH = box.offsetHeight;
    let top = r.top - bH - 8 >= 0 ? r.top - bH - 8 : r.bottom + 8;
    let left = Math.max(8, Math.min(r.left + r.width / 2 - bW / 2, window.innerWidth - bW - 8));
    box.style.top  = top  + 'px';
    box.style.left = left + 'px';
    box.classList.add('visible');
  }

  function hide() { clearTimeout(timer); box.classList.remove('visible'); }

  document.addEventListener('mouseover', function(e) {
    const t = e.target.closest('[data-tooltip]');
    if (!t) return;
    clearTimeout(timer);
    timer = setTimeout(function() { show(t); }, 120);
  });

  document.addEventListener('mouseout', function(e) {
    const from = e.target.closest('[data-tooltip]');
    if (!from) return;
    const to = e.relatedTarget && e.relatedTarget.closest('[data-tooltip]');
    if (to === from) return;
    clearTimeout(timer);
    hide();
  });

  document.addEventListener('scroll', hide, true);
  document.addEventListener('mousedown', hide);
})();

// ── Init ─────────────────────────────────────────────────────────────
seed();
render();
</script>
