<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Interés Compuesto</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="../../widget-common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toggle-bar">
    <a id="btn-widgets" class="bar-btn" href="/widgets" aria-label="Widgets">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </a>
    <button id="theme-toggle" aria-label="Cambiar tema"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
  <div id="ctx-menu" class="ctx-menu" hidden>
    <button id="ctx-capture">Modo captura</button>
    <div id="ctx-bg" class="ctx-bg" hidden>
      <div class="ctx-bg-row">
        <input id="ctx-bg-input" type="text" placeholder="#ffffff" spellcheck="false" autocomplete="off">
        <button id="ctx-bg-clear" class="ctx-bg-clear" title="Reset">&times;</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>Interés Compuesto</h1>
    <p class="subtitle">Tu dinero generando dinero, que a su vez genera más dinero.</p>

    <!-- Portfolio tabs -->
    <div class="portfolio-tabs" id="portfolio-tabs"></div>

    <!-- Form -->
    <div class="form" id="form">
      <div class="form-grid">
        <div class="form-group">
          <label for="input-capital">Capital inicial</label>
          <div class="input-wrap">
            <input id="input-capital" type="number" min="0" step="100" value="1000">
            <span class="input-unit">€</span>
          </div>
          <span class="form-hint">Dinero con el que empiezas</span>
        </div>
        <div class="form-group">
          <label for="input-monthly">Aportación mensual</label>
          <div class="input-wrap">
            <input id="input-monthly" type="number" min="0" step="50" value="200">
            <span class="input-unit">€</span>
          </div>
          <span class="form-hint">Lo que añades cada mes</span>
        </div>
        <div class="form-group form-group--wide">
          <label>Interés anual</label>
          <div class="slider-row">
            <div class="slider-track-wrap" id="slider-track-wrap">
              <input id="input-rate-range" type="range" min="0" max="50" step="0.5" value="7">
              <div class="slider-markers" id="slider-markers">
                <button class="marker" data-value="3" title="Inflación (~3%)"><span class="marker-tick"></span><span class="marker-val">3%</span><span class="marker-label">Inflación</span></button>
                <button class="marker" data-value="4.5" title="Bonos del tesoro (~4,5%)"><span class="marker-tick"></span><span class="marker-val">4,5%</span><span class="marker-label">Bonos</span></button>
                <button class="marker" data-value="10" title="S&P 500 (~10%)"><span class="marker-tick"></span><span class="marker-val">10%</span><span class="marker-label">S&amp;P 500</span></button>
                <button class="marker" data-value="30" title="BTC (~30%)"><span class="marker-tick"></span><span class="marker-val">30%</span><span class="marker-label">BTC</span></button>
              </div>
            </div>
            <div class="input-wrap input-wrap--sm">
              <input id="input-rate" type="number" min="0" max="100" step="0.5" value="7">
              <span class="input-unit">%</span>
            </div>
          </div>
        </div>
        <div class="form-group form-group--wide">
          <label>Duración</label>
          <div class="pills-row" id="pills-years">
            <button class="pill" data-years="5">5a</button>
            <button class="pill" data-years="10">10a</button>
            <button class="pill" data-years="15">15a</button>
            <button class="pill" data-years="20">20a</button>
            <button class="pill" data-years="30">30a</button>
            <button class="pill" data-years="50">50a</button>
            <div class="input-wrap input-wrap--sm">
              <input id="input-years" type="number" min="1" max="60" step="1" value="20">
              <span class="input-unit">años</span>
            </div>
            <span class="pills-sep"></span>
            <label class="checkbox-wrap">
              <input id="input-noise" type="checkbox">
              <span class="checkmark"></span>
              Volatilidad
            </label>
            <button id="btn-reroll" class="btn-reroll" title="Regenerar simulación" hidden>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="noise-modes" id="noise-modes" hidden>
        <label class="radio-wrap">
          <input type="radio" name="noise-mode" value="visual" id="noise-visual" checked>
          <span class="radio-dot"></span>
          Visual
          <span class="form-hint-inline">— Fluctúa pero acaba en el valor teórico</span>
        </label>
        <label class="radio-wrap">
          <input type="radio" name="noise-mode" value="real" id="noise-real">
          <span class="radio-dot"></span>
          Realista
          <span class="form-hint-inline">— El resultado final también varía</span>
        </label>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap" id="chart-wrap">
      <canvas id="chart"></canvas>
      <canvas id="chart-overlay"></canvas>
      <div class="chart-tooltip" id="chart-tooltip" hidden>
        <div class="tip-header" id="tip-header"></div>
        <div class="tip-rows" id="tip-rows"></div>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary" id="summary"></div>
  </div>

  <script src="../../widget-common.js"></script>
  <script src="app.js"></script>
</body>
</html>
