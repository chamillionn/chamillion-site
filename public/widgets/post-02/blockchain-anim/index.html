<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockchain — Chamillion</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="../../widget-common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toggle-bar">
  <a id="btn-widgets" class="bar-btn" href="/widgets" aria-label="Widgets">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </a>
  <button id="theme-toggle" aria-label="Cambiar tema"></button>
</div>

<div id="ctx-menu" class="ctx-menu" hidden>
  <button id="ctx-capture">Modo captura</button>
  <div id="ctx-bg" class="ctx-bg" hidden>
    <div class="ctx-bg-row">
      <input id="ctx-bg-input" type="text" placeholder="#hex o color">
      <button id="ctx-bg-clear" class="ctx-bg-clear">&times;</button>
    </div>
  </div>
  <div id="ctx-capture-dl" class="ctx-capture-dl" hidden>
    <div class="ctx-label">Resolución</div>
    <div class="ctx-scale-row">
      <button class="ctx-scale" data-scale="1">1x</button>
      <button class="ctx-scale active" data-scale="2">2x</button>
      <button class="ctx-scale" data-scale="3">3x</button>
      <button class="ctx-scale" data-scale="4">4x</button>
    </div>
    <button id="ctx-download" class="ctx-dl-btn">Descargar PNG</button>
    <button id="ctx-record" class="ctx-record-btn">Grabar video</button>
  </div>
</div>

<canvas id="chain"></canvas>

<script src="../../widget-common.js"></script>
<script>
initWidgetCommon('blockchain-anim', { shareUrl: '/widgets/post-02/blockchain-anim', recordCanvas: document.getElementById('chain') });
</script>
<script src="app.js"></script>
</body>
</html>
