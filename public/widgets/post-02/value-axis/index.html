<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Con divisa vs Sin divisa — Chamillion</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="../../widget-common.css">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0e11;
  --text: #e8e6e1;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #6b9ebb;
  --panel-bg: rgba(255,255,255,0.02);
  --panel-border: #1e2228;
  --axis-color: #2a3038;
  --axis-accent: #333a44;
  --link-color: rgba(255,255,255,0.10);
  --link-hover: rgba(255,255,255,0.25);
  --bread: #e8a840;
  --scissors: #6b9ebb;
  --dinner: #4ade80;
  --marker-shadow: rgba(0,0,0,0.4);
  --drag-glow: rgba(107,158,187,0.3);
  --ratio-bg: rgba(18,21,26,0.85);
  --ratio-border: #1e2228;
}

[data-theme="light"] {
  --bg: #f5ede0;
  --text: #1a1208;
  --text-dim: #706050;
  --text-muted: #a89080;
  --accent: #4a7a9a;
  --panel-bg: rgba(0,0,0,0.02);
  --panel-border: #d4c4b0;
  --axis-color: #c8b8a0;
  --axis-accent: #b8a890;
  --link-color: rgba(0,0,0,0.07);
  --link-hover: rgba(0,0,0,0.18);
  --bread: #c88a20;
  --scissors: #4a7a9a;
  --dinner: #16863a;
  --marker-shadow: rgba(0,0,0,0.12);
  --drag-glow: rgba(74,122,154,0.25);
  --ratio-bg: rgba(237,227,214,0.9);
  --ratio-border: #d4c4b0;
}

html, body {
  width: 100%;
  background: transparent;
  font-family: 'DM Mono', monospace;
  color: var(--text);
}
html:not(.embedded) { background: var(--bg); }
html { overflow: hidden; }

/* ── Layout ── */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 32px 16px 10px;
}

.panels {
  display: flex;
  gap: 12px;
}

.panel {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  background: var(--panel-bg);
  padding: 16px 14px 10px;
  position: relative;
}

.panel-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text);
  text-align: center;
  margin-bottom: 5px;
}

.panel-desc {
  text-align: center;
  font-size: 10.5px; line-height: 1.55;
  color: var(--text-dim);
  padding: 0 6px 10px;
}

/* ── Graph panel (sin divisa) ── */
.graph-area {
  position: relative;
  width: 100%;
  height: 280px;
}

.graph-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.graph-link {
  fill: none;
  stroke: var(--link-color);
  stroke-width: 1.2;
  transition: stroke 0.3s ease, stroke-width 0.3s ease;
}

.graph-link.highlight {
  stroke: var(--link-hover);
  stroke-width: 2;
}

.graph-ratio-pill {
  pointer-events: none;
}

.graph-ratio-pill rect {
  fill: var(--ratio-bg);
  stroke: var(--ratio-border);
  stroke-width: 0.5;
  rx: 8;
}

.graph-ratio-pill text {
  font-family: 'DM Mono', monospace;
  font-size: 7.5px;
  fill: var(--text-dim);
  text-anchor: middle;
  dominant-baseline: central;
  letter-spacing: 0.03em;
}

.graph-node {
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.graph-node:active { cursor: grabbing; }

.graph-node-bg {
  fill: var(--bg);
}
[data-theme="light"] .graph-node-bg { fill: var(--bg); }

.graph-node-circle {
  stroke-width: 1.5;
  fill: none;
  transition: stroke-width 0.25s ease, filter 0.25s ease;
}

.graph-node.hover .graph-node-circle {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 6px currentColor);
}

.graph-node.dragging .graph-node-circle {
  stroke-width: 3;
  filter: drop-shadow(0 0 10px currentColor);
}

.graph-node-icon {
  pointer-events: none;
}

.graph-node-label {
  font-family: 'DM Serif Display', serif;
  font-size: 8.5px;
  letter-spacing: 0.04em;
  fill: var(--text-dim);
  text-anchor: middle;
  text-transform: uppercase;
}

/* ── Axis panel (con divisa) ── */
.axis-area {
  position: relative;
  height: 280px;
}

.axis-line {
  position: absolute;
  left: 44%;
  top: 28px; bottom: 18px;
  width: 1.5px;
  background: var(--axis-color);
  border-radius: 1px;
  transform-origin: top;
}

.axis-symbol {
  position: absolute;
  top: -6px; left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--accent);
  line-height: 1;
}

.axis-tick {
  position: absolute;
  left: calc(44% - 4px);
  width: 9px; height: 1px;
  background: var(--axis-accent);
}

.axis-tick-label {
  position: absolute;
  left: calc(44% + 10px);
  transform: translateY(-50%);
  font-size: 7px;
  color: var(--text-muted);
  white-space: nowrap;
  letter-spacing: 0.02em;
  opacity: 0.6;
}

/* ── Axis markers (draggable) ── */
.axis-marker-wrap {
  position: absolute;
  left: 0; right: 0;
  height: 0;
  z-index: 10;
  transition: top 0.05s linear;
}

.axis-marker {
  position: absolute;
  left: 44%;
  width: 13px; height: 13px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 2px 8px var(--marker-shadow);
  cursor: grab;
  transition: box-shadow 0.25s ease, transform 0.25s ease;
  touch-action: none;
}
/* Larger invisible touch target */
.axis-marker::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
}
.axis-marker:active { cursor: grabbing; }

.axis-marker-wrap.dragging .axis-marker {
  transform: translate(-50%, -50%) scale(1.5);
  box-shadow: 0 0 0 6px var(--drag-glow), 0 2px 12px var(--marker-shadow);
}

.axis-marker-wrap.hover .axis-marker {
  transform: translate(-50%, -50%) scale(1.25);
  box-shadow: 0 0 0 4px var(--drag-glow), 0 2px 8px var(--marker-shadow);
}

.axis-marker-icon {
  position: absolute;
  right: calc(56% + 14px);
  width: 16px; height: 16px;
  transform: translateY(-50%);
  top: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.axis-marker-icon svg { width: 100%; height: 100%; }

.axis-marker-price {
  position: absolute;
  left: calc(44% + 16px);
  transform: translateY(-50%);
  top: 0;
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

/* Dim non-hovered markers */
.axis-marker-wrap.dimmed .axis-marker-icon,
.axis-marker-wrap.dimmed .axis-marker-price { opacity: 0.15; }
.axis-marker-wrap.dimmed .axis-marker { opacity: 0.2; }

/* ── Drag hint pulse ── */
@keyframes pulse-hint {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.35); }
}
.axis-marker.hint-pulse {
  animation: pulse-hint 1.2s ease-in-out 2;
}

/* ── Hover tooltip ── */
.hover-tooltip {
  position: absolute;
  pointer-events: none;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  line-height: 1.6;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 20;
}
.hover-tooltip .tt-line {
  display: block;
}
.hover-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── Static / Capture ── */
html.static .axis-marker,
html.capture .axis-marker { cursor: default; }
html.static .graph-node,
html.capture .graph-node { cursor: default; }

/* ── Responsive ── */
@media (max-width: 560px) {
  .panels { flex-direction: column; }
  .container { padding: 32px 10px 10px; }
  .graph-area, .axis-area { height: 280px; }
  .axis-marker-price { font-size: 13px; }
  .panel-title { font-size: 13px; }
}
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
(function () {
  var isStatic = /[?&]static=1/.test(location.search);
  if (isStatic) document.documentElement.classList.add('static');
  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var skipAnim = isStatic || document.documentElement.classList.contains('capture') || reducedMotion;

  /* ══ Data ══ */
  var items = [
    {
      id: 'bread', name: 'Pan', plural: 'panes', price: 1, colorVar: '--bread',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.2 18H4.774a1.5 1.5 0 0 1-1.352-.97 11 11 0 0 1 .132-6.487"/><path d="M18 10.2V4.774a1.5 1.5 0 0 0-.97-1.352 11 11 0 0 0-6.486.132"/><path d="M18 5a4 3 0 0 1 4 3 2 2 0 0 1-2 2 10 10 0 0 0-5.139 1.42"/><path d="M5 18a3 4 0 0 0 3 4 2 2 0 0 0 2-2 10 10 0 0 1 1.42-5.14"/><path d="M8.709 2.554a10 10 0 0 0-6.155 6.155 1.5 1.5 0 0 0 .676 1.626l9.807 5.42a2 2 0 0 0 2.718-2.718l-5.42-9.807a1.5 1.5 0 0 0-1.626-.676"/></svg>'
    },
    {
      id: 'scissors', name: 'Corte', plural: 'cortes', price: 20, colorVar: '--scissors',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>'
    },
    {
      id: 'dinner', name: 'Cena', plural: 'cenas', price: 80, colorVar: '--dinner',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H9c-1.5 4-2 6-2 8a5 5 0 0 0 5 5Z"/></svg>'
    }
  ];

  /* ══ Log scale ══ */
  var LOG_MIN = Math.log10(0.5);
  var LOG_MAX = Math.log10(250);
  var AXIS_PAD_TOP = 32;
  var AXIS_PAD_BOT = 22;

  function priceToFrac(p) {
    return 1 - (Math.log10(Math.max(p, 0.5)) - LOG_MIN) / (LOG_MAX - LOG_MIN);
  }

  function fracToPrice(f) {
    return Math.pow(10, LOG_MIN + (1 - f) * (LOG_MAX - LOG_MIN));
  }

  function formatEUR(v) {
    if (v >= 1000) return '€' + Math.round(v).toLocaleString('es-ES');
    if (v < 10) return '€' + (Math.round(v * 10) / 10);
    return '€' + Math.round(v);
  }

  function formatTickLabel(v) {
    if (v >= 1000) return '€' + (v / 1000) + 'k';
    return '€' + v;
  }

  function ratioLabel(a, b) {
    if (a.price === b.price) return '1:1';
    var expensive = a.price > b.price ? a : b;
    var cheap = a.price > b.price ? b : a;
    var n = expensive.price / cheap.price;
    if (n >= 100) return Math.round(n) + ':1';
    if (n >= 10) return Math.round(n) + ':1';
    return Math.round(n * 10) / 10 + ':1';
  }

  /* ════════════════════════════════════════════
     AXIS PANEL (right)
     ════════════════════════════════════════════ */
  var axisArea = document.getElementById('axis-area');
  var axisLine = document.getElementById('axis-line');
  var axisEls = [];

  function getAxisH() { return axisArea.offsetHeight - AXIS_PAD_TOP - AXIS_PAD_BOT; }
  function priceToY(p) { return AXIS_PAD_TOP + priceToFrac(p) * getAxisH(); }
  function yToPrice(y) { return fracToPrice((y - AXIS_PAD_TOP) / getAxisH()); }

  var tickVals = [1, 5, 10, 50, 100];

  function buildAxisTicks() {
    axisArea.querySelectorAll('.axis-tick, .axis-tick-label').forEach(function (e) { e.remove(); });
    tickVals.forEach(function (v) {
      var y = priceToY(v);
      var tick = document.createElement('div');
      tick.className = 'axis-tick';
      tick.style.top = y + 'px';
      axisArea.appendChild(tick);

      var label = document.createElement('div');
      label.className = 'axis-tick-label';
      label.style.top = y + 'px';
      label.textContent = formatTickLabel(v);
      axisArea.appendChild(label);
    });
  }

  function buildAxisMarkers() {
    items.forEach(function (item, i) {
      var y = priceToY(item.price);
      var color = 'var(' + item.colorVar + ')';

      var wrap = document.createElement('div');
      wrap.className = 'axis-marker-wrap';
      wrap.style.top = y + 'px';
      wrap.dataset.index = i;

      var marker = document.createElement('div');
      marker.className = 'axis-marker';
      marker.style.background = color;
      wrap.appendChild(marker);

      var icon = document.createElement('div');
      icon.className = 'axis-marker-icon';
      icon.style.color = color;
      icon.innerHTML = item.svg;
      wrap.appendChild(icon);

      var price = document.createElement('div');
      price.className = 'axis-marker-price';
      price.style.color = color;
      price.textContent = formatEUR(item.price);
      wrap.appendChild(price);

      axisArea.appendChild(wrap);
      axisEls.push({ wrap: wrap, marker: marker, icon: icon, price: price, item: item });
    });
  }

  function updateAxisPositions(animate) {
    var dur = animate ? 0.35 : 0;
    axisEls.forEach(function (ae) {
      var y = priceToY(ae.item.price);
      ae.price.textContent = formatEUR(ae.item.price);
      if (dur > 0) {
        gsap.to(ae.wrap, { top: y, duration: dur, ease: 'power2.out', overwrite: true });
      } else {
        ae.wrap.style.top = y + 'px';
      }
    });
  }

  buildAxisTicks();
  buildAxisMarkers();

  /* ════════════════════════════════════════════
     GRAPH PANEL (left)
     ════════════════════════════════════════════ */
  var graphSvg = document.getElementById('graph-svg');
  var graphArea = document.getElementById('graph-area');

  // Angles: pollo top-center, corte bottom-left, coche bottom-right
  var nodeAngles = [-Math.PI / 2, Math.PI * 5 / 6, Math.PI / 6];
  var GRAPH_R_MIN_FRAC = 0.20;
  var GRAPH_R_MAX_FRAC = 0.46;
  var graphNodes = [];
  var graphLinks = [];

  function getGraphCenter() {
    var w = graphArea.offsetWidth;
    var h = graphArea.offsetHeight;
    return { cx: w / 2, cy: h / 2 + 4 };
  }

  function nodePos(i) {
    var c = getGraphCenter();
    var item = items[i];
    var logP = Math.log10(Math.max(item.price, 0.5));
    var frac = (logP - LOG_MIN) / (LOG_MAX - LOG_MIN);
    var extent = Math.min(graphArea.offsetWidth, graphArea.offsetHeight);
    var nodeR = extent * GRAPH_R_MIN_FRAC + frac * extent * (GRAPH_R_MAX_FRAC - GRAPH_R_MIN_FRAC);
    return {
      x: c.cx + Math.cos(nodeAngles[i]) * nodeR,
      y: c.cy + Math.sin(nodeAngles[i]) * nodeR
    };
  }

  function nodeSize(item) {
    var logP = Math.log10(Math.max(item.price, 0.5));
    var t = (logP - LOG_MIN) / (LOG_MAX - LOG_MIN);
    return 20 + t * 32;
  }

  var pairs = [[0, 1], [1, 2], [0, 2]];

  function curvePath(pa, pb, center) {
    var mx = (pa.x + pb.x) / 2;
    var my = (pa.y + pb.y) / 2;
    var cx = mx + (center.cx - mx) * 0.55;
    var cy = my + (center.cy - my) * 0.55;
    return {
      d: 'M' + pa.x.toFixed(1) + ',' + pa.y.toFixed(1) + ' Q' + cx.toFixed(1) + ',' + cy.toFixed(1) + ' ' + pb.x.toFixed(1) + ',' + pb.y.toFixed(1),
      mx: (pa.x + pb.x + cx) / 3,
      my: (pa.y + pb.y + cy) / 3
    };
  }

  function buildGraph() {
    graphSvg.innerHTML = '';
    graphNodes = [];
    graphLinks = [];

    var c = getGraphCenter();

    // Links first
    pairs.forEach(function (pair) {
      var pa = nodePos(pair[0]), pb = nodePos(pair[1]);
      var curve = curvePath(pa, pb, c);

      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'graph-link');
      path.setAttribute('d', curve.d);
      graphSvg.appendChild(path);

      // Ratio pill
      var pill = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      pill.setAttribute('class', 'graph-ratio-pill');

      var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      pill.appendChild(bg);

      var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', curve.mx);
      text.setAttribute('y', curve.my);
      pill.appendChild(text);

      graphSvg.appendChild(pill);
      graphLinks.push({ path: path, pill: pill, bg: bg, text: text, a: pair[0], b: pair[1] });
    });

    // Nodes
    items.forEach(function (item, i) {
      var p = nodePos(i);
      var r = nodeSize(item);
      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'graph-node');
      g.dataset.index = i;

      var bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bgCircle.setAttribute('class', 'graph-node-bg');
      bgCircle.setAttribute('cx', p.x);
      bgCircle.setAttribute('cy', p.y);
      bgCircle.setAttribute('r', r);
      g.appendChild(bgCircle);

      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('class', 'graph-node-circle');
      circle.setAttribute('cx', p.x);
      circle.setAttribute('cy', p.y);
      circle.setAttribute('r', r);
      circle.setAttribute('stroke', 'var(' + item.colorVar + ')');
      g.appendChild(circle);

      var iconSize = Math.max(14, r * 0.65);
      var fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
      fo.setAttribute('class', 'graph-node-icon');
      fo.setAttribute('x', p.x - iconSize / 2);
      fo.setAttribute('y', p.y - iconSize / 2);
      fo.setAttribute('width', iconSize);
      fo.setAttribute('height', iconSize);
      var iconDiv = document.createElement('div');
      iconDiv.style.cssText = 'color:var(' + item.colorVar + ');width:100%;height:100%;';
      iconDiv.innerHTML = item.svg;
      var svgEl = iconDiv.querySelector('svg');
      svgEl.style.width = '100%';
      svgEl.style.height = '100%';
      fo.appendChild(iconDiv);
      g.appendChild(fo);

      var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('class', 'graph-node-label');
      label.setAttribute('x', p.x);
      label.setAttribute('y', p.y + r + 14);
      label.textContent = item.name;
      g.appendChild(label);

      graphSvg.appendChild(g);
      graphNodes.push({ g: g, bgCircle: bgCircle, circle: circle, fo: fo, label: label, item: item, index: i });
    });

    updateGraphRatios();
  }

  function updateGraphRatios() {
    graphLinks.forEach(function (link) {
      var a = items[link.a], b = items[link.b];
      var label = ratioLabel(a, b);
      link.text.textContent = label;

      try {
        var bbox = link.text.getBBox();
        link.bg.setAttribute('x', bbox.x - 8);
        link.bg.setAttribute('y', bbox.y - 3.5);
        link.bg.setAttribute('width', bbox.width + 16);
        link.bg.setAttribute('height', bbox.height + 7);
      } catch (e) {}
    });
  }

  function updateGraphFull() {
    var c = getGraphCenter();

    graphNodes.forEach(function (gn, i) {
      var p = nodePos(i);
      var r = nodeSize(gn.item);
      var iconSize = Math.max(14, r * 0.65);

      gsap.to(gn.bgCircle, { attr: { cx: p.x, cy: p.y, r: r }, duration: 0.3, ease: 'power2.out' });
      gsap.to(gn.circle, { attr: { cx: p.x, cy: p.y, r: r }, duration: 0.3, ease: 'power2.out' });
      gsap.to(gn.fo, { attr: { x: p.x - iconSize / 2, y: p.y - iconSize / 2, width: iconSize, height: iconSize }, duration: 0.3, ease: 'power2.out' });
      gsap.to(gn.label, { attr: { x: p.x, y: p.y + r + 14 }, duration: 0.3, ease: 'power2.out' });
    });

    pairs.forEach(function (pair, pi) {
      var pa = nodePos(pair[0]), pb = nodePos(pair[1]);
      var curve = curvePath(pa, pb, c);
      graphLinks[pi].path.setAttribute('d', curve.d);
      graphLinks[pi].text.setAttribute('x', curve.mx);
      graphLinks[pi].text.setAttribute('y', curve.my);
    });

    updateGraphRatios();
  }

  function updateGraphImmediate() {
    var c = getGraphCenter();

    graphNodes.forEach(function (gn, i) {
      var p = nodePos(i);
      var r = nodeSize(gn.item);
      var iconSize = Math.max(14, r * 0.65);

      gn.bgCircle.setAttribute('cx', p.x);
      gn.bgCircle.setAttribute('cy', p.y);
      gn.bgCircle.setAttribute('r', r);
      gn.circle.setAttribute('cx', p.x);
      gn.circle.setAttribute('cy', p.y);
      gn.circle.setAttribute('r', r);
      gn.fo.setAttribute('x', p.x - iconSize / 2);
      gn.fo.setAttribute('y', p.y - iconSize / 2);
      gn.fo.setAttribute('width', iconSize);
      gn.fo.setAttribute('height', iconSize);
      gn.label.setAttribute('x', p.x);
      gn.label.setAttribute('y', p.y + r + 14);
    });

    pairs.forEach(function (pair, pi) {
      var pa = nodePos(pair[0]), pb = nodePos(pair[1]);
      var curve = curvePath(pa, pb, c);
      graphLinks[pi].path.setAttribute('d', curve.d);
      graphLinks[pi].text.setAttribute('x', curve.mx);
      graphLinks[pi].text.setAttribute('y', curve.my);
    });

    updateGraphRatios();
  }

  buildGraph();

  /* ════════════════════════════════════════════
     HOVER TOOLTIPS
     ════════════════════════════════════════════ */
  var graphTooltip = document.createElement('div');
  graphTooltip.className = 'hover-tooltip';
  graphArea.appendChild(graphTooltip);

  var axisTooltip = document.createElement('div');
  axisTooltip.className = 'hover-tooltip';
  axisArea.appendChild(axisTooltip);

  function fmtRatio(a, b) {
    var r = a / b;
    if (r >= 10) return Math.round(r);
    if (r >= 1) return Math.round(r * 10) / 10;
    if (r >= 0.1) return Math.round(r * 100) / 100;
    return '1/' + Math.round(b / a);
  }

  function getC(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }

  var hoveredIdx = -1;

  function updateTooltipContent(idx) {
    var item = items[idx];
    var others = items.filter(function(_, i) { return i !== idx; });
    var itemColor = getC(item.colorVar);

    var html = others.map(function(o) {
      var oColor = getC(o.colorVar);
      var r = item.price / o.price;
      var label = r === 1 ? '1 ' + o.name.toLowerCase() : fmtRatio(item.price, o.price) + ' ' + o.plural;
      return '<span class="tt-line" style="color:' + oColor + '">1 ' + item.name.toLowerCase() + ' = ' + label + '</span>';
    }).join('');
    graphTooltip.innerHTML = html;

    axisTooltip.innerHTML = '<span style="color:' + itemColor + '">1 ' + item.name.toLowerCase() + ' = ' + formatEUR(item.price) + '</span>';
  }

  function updateTooltipPosition(idx) {
    var item = items[idx];
    var gp = nodePos(idx);
    var r = nodeSize(item);
    graphTooltip.style.left = gp.x + 'px';
    var ttTop = gp.y - r - 38;
    if (ttTop < 10) {
      graphTooltip.style.top = (gp.y + r + 12) + 'px';
    } else {
      graphTooltip.style.top = ttTop + 'px';
    }
    graphTooltip.style.transform = 'translateX(-50%)';

    var ay = priceToY(item.price);
    axisTooltip.style.left = 'calc(44% + 16px)';
    axisTooltip.style.top = (ay + 16) + 'px';
    axisTooltip.style.transform = 'none';
  }

  function showHoverDesc(idx) {
    hoveredIdx = idx;
    updateTooltipContent(idx);
    updateTooltipPosition(idx);
    graphTooltip.classList.add('visible');
    axisTooltip.classList.add('visible');
  }

  function refreshHoverTooltip() {
    if (hoveredIdx < 0) return;
    updateTooltipContent(hoveredIdx);
    updateTooltipPosition(hoveredIdx);
  }

  function clearHoverDesc() {
    hoveredIdx = -1;
    graphTooltip.classList.remove('visible');
    axisTooltip.classList.remove('visible');
  }

  /* ════════════════════════════════════════════
     HOVER — Axis markers
     ════════════════════════════════════════════ */
  axisEls.forEach(function (ae, i) {
    ae.wrap.addEventListener('mouseenter', function () {
      ae.wrap.classList.add('hover');
      axisEls.forEach(function (other) {
        if (other !== ae) other.wrap.classList.add('dimmed');
      });
      graphNodes.forEach(function (gn, gi) {
        if (gi !== i) gsap.to(gn.g, { opacity: 0.2, duration: 0.2 });
      });
      graphLinks.forEach(function (gl) {
        if (gl.a === i || gl.b === i) gl.path.classList.add('highlight');
        else gsap.to(gl.pill, { opacity: 0.15, duration: 0.2 });
      });
      showHoverDesc(i);
    });
    ae.wrap.addEventListener('mouseleave', function () {
      ae.wrap.classList.remove('hover');
      axisEls.forEach(function (other) { other.wrap.classList.remove('dimmed'); });
      graphNodes.forEach(function (gn) { gsap.to(gn.g, { opacity: 1, duration: 0.2 }); });
      graphLinks.forEach(function (gl) {
        gl.path.classList.remove('highlight');
        gsap.to(gl.pill, { opacity: 1, duration: 0.2 });
      });
      clearHoverDesc();
    });
  });

  /* ════════════════════════════════════════════
     HOVER — Graph nodes
     ════════════════════════════════════════════ */
  graphNodes.forEach(function (gn, i) {
    gn.g.addEventListener('mouseenter', function () {
      gn.g.classList.add('hover');
      graphNodes.forEach(function (other) {
        if (other !== gn) gsap.to(other.g, { opacity: 0.2, duration: 0.2 });
      });
      graphLinks.forEach(function (gl) {
        if (gl.a === i || gl.b === i) gl.path.classList.add('highlight');
        else gsap.to(gl.pill, { opacity: 0.15, duration: 0.2 });
      });
      axisEls.forEach(function (ae, ai) {
        if (ai !== i) ae.wrap.classList.add('dimmed');
        else ae.wrap.classList.add('hover');
      });
      showHoverDesc(i);
    });
    gn.g.addEventListener('mouseleave', function () {
      gn.g.classList.remove('hover');
      graphNodes.forEach(function (other) {
        gsap.to(other.g, { opacity: 1, duration: 0.2 });
      });
      graphLinks.forEach(function (gl) {
        gl.path.classList.remove('highlight');
        gsap.to(gl.pill, { opacity: 1, duration: 0.2 });
      });
      axisEls.forEach(function (ae) { ae.wrap.classList.remove('dimmed', 'hover'); });
      clearHoverDesc();
    });
  });

  /* ════════════════════════════════════════════
     DRAGGING — Axis markers
     ════════════════════════════════════════════ */
  if (!skipAnim) {
    axisEls.forEach(function (ae) {
      ae.marker.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        ae.wrap.classList.add('dragging');
        ae.marker.setPointerCapture(e.pointerId);

        function onMove(ev) {
          var z = getZoom();
          var rect = axisArea.getBoundingClientRect();
          var localY = (ev.clientY - rect.top) / z;
          localY = Math.max(AXIS_PAD_TOP, Math.min(axisArea.offsetHeight - AXIS_PAD_BOT, localY));
          var newPrice = yToPrice(localY);
          newPrice = Math.max(0.5, Math.min(250, newPrice));
          ae.item.price = newPrice < 10 ? Math.round(newPrice * 10) / 10 : Math.round(newPrice);

          ae.wrap.style.top = localY + 'px';
          ae.price.textContent = formatEUR(ae.item.price);
          updateGraphImmediate();
          refreshHoverTooltip();
        }

        function onUp() {
          ae.wrap.classList.remove('dragging');
          ae.marker.removeEventListener('pointermove', onMove);
          ae.marker.removeEventListener('pointerup', onUp);
          ae.marker.removeEventListener('pointercancel', onUp);
        }

        ae.marker.addEventListener('pointermove', onMove);
        ae.marker.addEventListener('pointerup', onUp);
        ae.marker.addEventListener('pointercancel', onUp);
      });
    });
  }

  /* ════════════════════════════════════════════
     DRAGGING — Graph nodes (radial)
     ════════════════════════════════════════════ */
  if (!skipAnim) {
    graphNodes.forEach(function (gn) {
      gn.g.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        gn.g.classList.add('dragging');

        var c = getGraphCenter();
        var angle = nodeAngles[gn.index];
        var extent = Math.min(graphArea.offsetWidth, graphArea.offsetHeight);
        var minR = extent * GRAPH_R_MIN_FRAC;
        var maxR = extent * GRAPH_R_MAX_FRAC;

        function onMove(ev) {
          ev.preventDefault();
          var z = getZoom();
          var rect = graphArea.getBoundingClientRect();
          var mx = (ev.clientX - rect.left) / z;
          var my = (ev.clientY - rect.top) / z;

          var dx = mx - c.cx;
          var dy = my - c.cy;
          var dist = dx * Math.cos(angle) + dy * Math.sin(angle);
          dist = Math.max(minR, Math.min(maxR, dist));

          var frac = (dist - minR) / (maxR - minR);
          var newPrice = Math.pow(10, LOG_MIN + frac * (LOG_MAX - LOG_MIN));
          newPrice = Math.max(0.5, Math.min(250, newPrice));
          gn.item.price = newPrice < 10 ? Math.round(newPrice * 10) / 10 : Math.round(newPrice);

          var nx = c.cx + Math.cos(angle) * dist;
          var ny = c.cy + Math.sin(angle) * dist;
          var r = nodeSize(gn.item);
          var iconSize = Math.max(14, r * 0.65);

          gn.bgCircle.setAttribute('cx', nx);
          gn.bgCircle.setAttribute('cy', ny);
          gn.bgCircle.setAttribute('r', r);
          gn.circle.setAttribute('cx', nx);
          gn.circle.setAttribute('cy', ny);
          gn.circle.setAttribute('r', r);
          gn.fo.setAttribute('x', nx - iconSize / 2);
          gn.fo.setAttribute('y', ny - iconSize / 2);
          gn.fo.setAttribute('width', iconSize);
          gn.fo.setAttribute('height', iconSize);
          gn.label.setAttribute('x', nx);
          gn.label.setAttribute('y', ny + r + 14);

          pairs.forEach(function (pair, pi) {
            var aPos = pair[0] === gn.index ? { x: nx, y: ny } : nodePos(pair[0]);
            var bPos = pair[1] === gn.index ? { x: nx, y: ny } : nodePos(pair[1]);
            var curve = curvePath(aPos, bPos, c);
            graphLinks[pi].path.setAttribute('d', curve.d);
            graphLinks[pi].text.setAttribute('x', curve.mx);
            graphLinks[pi].text.setAttribute('y', curve.my);
          });

          updateGraphRatios();
          updateAxisPositions(false);
          refreshHoverTooltip();
        }

        function onUp() {
          gn.g.classList.remove('dragging');
          updateGraphImmediate();
          updateAxisPositions(false);
          refreshHoverTooltip();
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          document.removeEventListener('pointercancel', onUp);
        }

        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        document.addEventListener('pointercancel', onUp);
      });
    });
  }

  /* ════════════════════════════════════════════
     ENTRANCE ANIMATION
     ════════════════════════════════════════════ */
  if (!skipAnim) {
    // Panel titles & descriptions
    gsap.set('.panel-title', { opacity: 0, y: -10 });
    gsap.set('.panel-desc', { opacity: 0 });

    // Axis
    gsap.set('#axis-line', { scaleY: 0, transformOrigin: 'top' });
    gsap.set('.axis-tick, .axis-tick-label', { opacity: 0 });
    axisEls.forEach(function (ae) { gsap.set(ae.wrap, { opacity: 0, x: -12 }); });

    // Graph
    graphNodes.forEach(function (gn) {
      gsap.set(gn.circle, { attr: { r: 0 } });
      gsap.set(gn.bgCircle, { attr: { r: 0 } });
      gsap.set(gn.fo, { opacity: 0 });
      gsap.set(gn.label, { opacity: 0 });
    });
    gsap.set('.graph-link', { opacity: 0 });
    gsap.set('.graph-ratio-pill', { opacity: 0 });

    var tl = gsap.timeline({ delay: 0.15 });

    // Titles slide down
    tl.to('.panel-title', { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', stagger: 0.08 }, 0);
    tl.to('.panel-desc', { opacity: 1, duration: 0.5, ease: 'power2.out', stagger: 0.08 }, 0.15);

    // Axis line grows
    tl.to('#axis-line', { scaleY: 1, duration: 0.7, ease: 'power3.inOut' }, 0.25);
    tl.to('.axis-tick, .axis-tick-label', { opacity: 1, duration: 0.3, stagger: 0.04 }, 0.55);

    // Axis markers slide in
    axisEls.forEach(function (ae, i) {
      tl.to(ae.wrap, { opacity: 1, x: 0, duration: 0.5, ease: 'back.out(1.5)' }, 0.65 + i * 0.1);
    });

    // Graph nodes pop in
    graphNodes.forEach(function (gn, i) {
      var r = nodeSize(gn.item);
      tl.to(gn.circle, { attr: { r: r }, duration: 0.6, ease: 'back.out(2.5)' }, 0.35 + i * 0.12);
      tl.to(gn.bgCircle, { attr: { r: r }, duration: 0.6, ease: 'back.out(2.5)' }, 0.35 + i * 0.12);
      tl.to(gn.fo, { opacity: 1, duration: 0.3 }, 0.55 + i * 0.12);
      tl.to(gn.label, { opacity: 1, duration: 0.3 }, 0.65 + i * 0.12);
    });

    // Graph links draw in
    graphLinks.forEach(function (gl, i) {
      var pathEl = gl.path;
      var len = pathEl.getTotalLength ? pathEl.getTotalLength() : 200;
      pathEl.style.strokeDasharray = len;
      pathEl.style.strokeDashoffset = len;
      tl.to(pathEl, {
        opacity: 1, strokeDashoffset: 0,
        duration: 0.6, ease: 'power2.inOut'
      }, 0.7 + i * 0.08);
    });
    tl.to('.graph-ratio-pill', { opacity: 1, duration: 0.4, stagger: 0.06 }, 1.0);

    // Drag hint: pulse the car marker briefly after animation
    tl.call(function () {
      if (axisEls[2]) axisEls[2].marker.classList.add('hint-pulse');
      setTimeout(function () {
        if (axisEls[2]) axisEls[2].marker.classList.remove('hint-pulse');
      }, 2600);
    }, null, 1.5);
  }
}());
</script>
</body>
</html>
